<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This page is an assignment of the course 
          WDD 131 Dynamic Web Fundamentals by BYU-I Week 03. It was developed by Alberto Villanueva. The assignment is about responsive images using srcset">
    <meta name="author" content="Alberto Villanueva">
    <title>Place</title>
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script><link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Chile</h1>
        </div>
        
    </header>
    
    <section class="hero">
        <picture>
            <source srcset="images/place-hero-large.webp" media="(min-width: 1000px)">
            <source srcset="images/place-hero-medium.webp" media="(min-width: 500px)">
            <img src="images/place-hero-small.webp" alt="Chile" width="500" height="250">
        </picture>
    </section>

    <div class="content">
        <section aria-labelledby="data-section" class="data-section">
            <div class="data-container">
                <h2>Data</h2>
                <dl class="data-grid">
                    <dt>Area:</dt><dd>756,102 sq km</dd>
                    <dt>Population:</dt><dd>19,458,310</dd>
                    <dt>Capital:</dt><dd>Santiago</dd>
                    <dt>Languages:</dt><dd>Spanish</dd>
                    <dt>Currency:</dt><dd>Chilean Peso</dd>
                    <dt>Time Zone:</dt><dd>UTC−4</dd>
                    <dt>Calling Code:</dt><dd>+56</dd>
                    <dt>Internet TLD:</dt><dd>.cl</dd>
                </dl>
            </div>
            
        </section>
        
        <section aria-labelledby="weather-section" class="weather-section">
            <div class="weather-container">
                <h2>Weather</h2>
                <figure>
                    <img src="images/weather-icon.jpg" alt="Weather Icon">
                    <figcaption>Weather Information</figcaption>
                </figure>
                <dl>
                    <dt>Temperature:</dt><dd>15°C</dd>
                    <dt>Conditions:</dt><dd>Sunny</dd>
                    <dt>Wind:</dt><dd>10 km/h</dd>
                    <dt>Wind Chill:</dt><dd>13°C</dd>
                </dl>

            </div>
            
        </section>
    </div>
    <footer class="headline">
        <p>&copy;<span id="currentyear"></span> 😎 Alberto Villanueva 😎 Chile.</p>
        <p id="lastModified" class="highlighted"></p>
    </footer>
</body>
</html>
